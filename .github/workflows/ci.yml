name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: pytest
        run: python -m pytest tests/ -v

      - name: Import smoke
        run: |
          python -c "from agentprompt import Messages, Prompt, MissingVariableError; \
                     m = Messages().system('You are {{adj}}.').user('Hi').render({'adj': 'concise'}); \
                     assert m[0]['content'] == 'You are concise.'; \
                     print('OK — agentprompt imports + renders')"
